name: Deploy production site to gh-pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy main to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          target-folder: .
          clean: true
          # Don't let the production deploy wipe out active PR preview
          # subdirectories deployed by pages-preview.yml.
          clean-exclude: |
            pr-preview
